<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="r1"><rect width="480" height="200" rx="16"/></clipPath>
</defs>
<g clip-path="url(#r1)">
<rect width="480" height="200" fill="#0d0620"/>
<rect width="480" height="200" fill="none" stroke="#c264e8" stroke-width="1.5" rx="16"/>
<text x="24" y="34" font-family="Consolas,Monaco,monospace" font-size="16" fill="#ff9ff0" font-weight="bold">Affan's GitHub Stats</text>

<!-- rank ring -->
<circle cx="380" cy="110" r="46" fill="none" stroke="#2a1240" stroke-width="10"/>
<circle cx="380" cy="110" r="46" fill="none" stroke="#c264e8" stroke-width="10" stroke-linecap="round"
  stroke-dasharray="289" stroke-dashoffset="289" transform="rotate(-90 380 110)">
  <animate attributeName="stroke-dashoffset" values="289;70" dur="1.6s" begin="0.3s" fill="freeze"/>
</circle>
<text x="380" y="117" font-family="Consolas,Monaco,monospace" font-size="22" fill="#fff" text-anchor="middle">B+</text>

<g font-family="Consolas,Monaco,monospace" font-size="14" fill="#e9c6ff">
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.2s" fill="freeze"/>
    <text x="24" y="72">Total Stars: 12</text></g>
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.5s" fill="freeze"/>
    <text x="24" y="98">Total Commits: 480+</text></g>
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.8s" fill="freeze"/>
    <text x="24" y="124">Total PRs: 20</text></g>
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.1s" fill="freeze"/>
    <text x="24" y="150">Contributed to: 3 repos</text></g>
</g>
</g>
</svg>